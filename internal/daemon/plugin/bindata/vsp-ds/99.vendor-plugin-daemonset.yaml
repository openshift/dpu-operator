apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vsp
  namespace: {{.Namespace}}
spec:
  selector:
    matchLabels:
      name: vsp
  template:
    metadata:
      labels:
        name: vsp
    spec:
      nodeSelector:
        dpu: "true"
      hostNetwork: true
      serviceAccountName: vsp-sa
      terminationGracePeriodSeconds: 180
      containers:
      - name: appcntr1
        image: {{.VendorSpecificPluginImage}}
        imagePullPolicy: {{.ImagePullPolicy}}
        securityContext:
          privileged: true
          runAsUser: 0
        command: {{.Command}}
        args: {{.Args}}
        volumeMounts:
        - mountPath: /var/run/
          name: vendor-plugin-sock
        - mountPath: /opt/p4/p4-cp-nws/var
          mountPropagation: Bidirectional
          name: host-opt
        - mountPath: /proc
          mountPropagation: Bidirectional
          name: host-proc
        - mountPath: /usr/local/bin/
          mountPropagation: Bidirectional
          name: ovs-bin
        - mountPath: /var/run/openvswitch/
          mountPropagation: Bidirectional
          name: ovs-db
        - mountPath: /usr/lib64/
          mountPropagation: Bidirectional
          name: host-lib64
        - mountPath: /lib/modules
          mountPropagation: HostToContainer
          name: host-libmodules
        - mountPath: /etc/openvswitch/
          mountPropagation: Bidirectional
          name: ovs-etc
      env:
       - name: LD_LIBRARY_PATH
         value: /usr/lib64:$LD_LIBRARY_PATH
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - hostPath:
          path: /proc
          type: ""
        name: host-proc
      - hostPath:
          path: /opt/p4/p4-cp-nws/var
          type: ""
        name: host-opt
      - hostPath:
          path: /lib/modules
          type: DirectoryOrCreate
        name: host-libmodules
      - hostPath:
          path: /var/run/
          type: ""
        name: vendor-plugin-sock
      - hostPath:
          path: /usr/bin/
          type: ""
        name: ovs-bin
      - hostPath:
          path: /var/run/openvswitch/
          type: ""
        name: ovs-db
      - hostPath:
          path: /usr/lib64/
          type: ""
        name: host-lib64
      - hostPath:
          path: /etc/openvswitch/
          type: ""
        name: ovs-etc
