apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vsp
  namespace: {{.Namespace}}
spec:
  selector:
    matchLabels:
      name: vsp
  template:
    metadata:
      labels:
        name: vsp
    spec:
      nodeSelector:
        dpu: "true"
      hostNetwork: true
      hostPID: true
      serviceAccountName: vsp-sa
      terminationGracePeriodSeconds: 180
      containers:
      - name: appcntr1
        image: {{.VendorSpecificPluginImage}}
        imagePullPolicy: {{.ImagePullPolicy}}
        securityContext:
          privileged: true
          runAsUser: 0
        command: {{.Command}}
        args: {{.Args}}
        resources:
          {{- if not (eq .WithHugepages "") }}
          requests:
            memory: {{.WithMemory}}
            {{.WithHugepages}}: {{.WithMemory}}
          limits:
            memory: {{.WithMemory}}
            {{.WithHugepages}}: {{.WithMemory}}
          {{- end }}
        volumeMounts:
        - mountPath: /host
          mountPropagation: Bidirectional
          name: host-root
        - mountPath: /var/run/
          name: vendor-plugin-sock
        - mountPath: /opt/p4/p4-cp-nws/var
          mountPropagation: Bidirectional
          name: host-opt
        - mountPath: /proc
          mountPropagation: Bidirectional
          name: host-proc
        - mountPath: /dev/
          mountPropagation: Bidirectional
          name: host-dev
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - hostPath:
          path: /proc
          type: ""
        name: host-proc
      - hostPath:
          path: /opt/p4/p4-cp-nws/var
          type: ""
        name: host-opt
      - hostPath:
          path: /var/run/
          type: ""
        name: vendor-plugin-sock
      - hostPath:
          path: /
          type: ""
        name: host-root
      - hostPath:
          path: /dev/
          type: ""
        name: host-dev
