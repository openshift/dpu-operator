version: '3'

run: when_changed

env:
  CGO_ENABLED: "0"
  GOARCH:   '{{ default "amd64" .GOARCH }}'
  GOOS:     '{{ default "linux" .GOOS }}'
  SUBMODULES: '{{ default "true" .SUBMODULES }}'

vars:
  DPU_OPERATOR_TEMP_DIR: /tmp/dpu-operator-tmp
  DPU_OPERATOR_GO_CACHE: /tmp/dpu-operator-cache
  BINDIR: bin
  BINDIR_ABS:
    sh: if [[ "{{.BINDIR}}" = /* ]]; then echo "{{.BINDIR}}"; else echo "$(pwd)/{{.BINDIR}}"; fi
  REGISTRY:
    sh: |
      if [ -n "${REGISTRY:-}" ]; then
        echo "${REGISTRY}"
      else
        hostname | sed 's/$/:5000/'
      fi
  PUSH_TLS_VERIFY: '{{ default "true" .PUSH_TLS_VERIFY }}'
  ENVTEST_K8S_VERSION: 1.31.0
  KUSTOMIZE_VERSION: v5.6.0
  GINKGO_VERSION:
    sh: go list -m -f '{{"{{.Version}}"}}' github.com/onsi/ginkgo/v2 | sed 's/^v//'
  CONTROLLER_TOOLS_VERSION: v0.19.0
  SETUP_ENVTEST_VERSION: release-0.20
  OPERATOR_SDK_VERSION: v1.41.0
  OPM_VERSION: v1.23.0
  DEPLOY_PROFILE: '{{ default "openshift" .DEPLOY_PROFILE }}'
  K8S_CLI:
    sh: |
      if command -v oc >/dev/null 2>&1; then
        echo oc
      else
        echo kubectl
      fi
  KUBECONFIG_HOST: "/root/kubeconfig.ocpcluster"
  KUBECONFIG_DPU: "/root/kubeconfig.microshift"

includes:
  images:
    taskfile: ./taskfiles/images.yaml
    flatten: true
  binaries:
    taskfile: ./taskfiles/binaries.yaml
    flatten: true
  clusters:
    taskfile: ./taskfiles/clusters.yaml
    flatten: true
  operator-sdk:
    taskfile: ./taskfiles/operator-sdk.yaml
    flatten: true
  proto:
    taskfile: ./taskfiles/proto.yaml
    flatten: true
  check:
    taskfile: ./taskfiles/check.yaml
    flatten: true
  
tasks:
  bindir:
    silent: true
    cmds:
      - echo "{{.BINDIR_ABS}}"

  push-image-helper:
    internal: true
    vars:
      SOURCE: '{{.SOURCE}}'
      IMAGE: '{{.IMAGE}}'
    cmds:
      - buildah manifest push --all --tls-verify={{.PUSH_TLS_VERIFY}} '{{.SOURCE}}-manifest' 'docker://{{.IMAGE}}'

  undeploy-helper:
    internal: true
    deps:
      - task: kustomize
    vars:
      KUBECONFIG: '{{.KUBECONFIG}}'
    status:
      - NS=$(KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get ns openshift-dpu-operator)
        if [[ -n "$NS" ]]; then false else true fi
    cmds:
      - KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} -n openshift-dpu-operator delete pod -l app=vsp --ignore-not-found=true --wait=false || true
      - KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} delete -f examples/config.yaml --ignore-not-found=true --wait=false || true
      - |
        if KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get dpuoperatorconfig.config.openshift.io dpu-operator-config >/dev/null 2>&1; then
          if ! KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} wait --for=delete dpuoperatorconfig.config.openshift.io/dpu-operator-config --timeout=120s; then
            echo "Timed out waiting for DpuOperatorConfig deletion, removing finalizers"
            KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} patch dpuoperatorconfig.config.openshift.io dpu-operator-config --type=merge -p '{"metadata":{"finalizers":[]}}' || true
          fi
        fi
      - bin/kustomize build config/default | KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} delete --ignore-not-found=true --wait=false -f -
      - |
        if KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get ns openshift-dpu-operator >/dev/null 2>&1; then
          if ! KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} wait --for=delete ns openshift-dpu-operator --timeout=300s; then
            echo "Timed out waiting for namespace openshift-dpu-operator deletion"
            echo "Namespace phase/finalizers:"
            KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get ns openshift-dpu-operator -o jsonpath='{.status.phase}{"\n"}{.spec.finalizers}{"\n"}' || true
            echo "Remaining common resources in openshift-dpu-operator:"
            KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get pod,deploy,ds,rs,svc,sa,cm,secret,role,rolebinding -n openshift-dpu-operator --ignore-not-found=true || true
            if [ "${FORCE_UNDEPLOY:-false}" = "true" ]; then
              echo "FORCE_UNDEPLOY=true set, clearing namespace finalizers"
              KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} patch ns openshift-dpu-operator --type=merge -p '{"spec":{"finalizers":[]}}' || true
              KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} wait --for=delete ns openshift-dpu-operator --timeout=120s || true
            fi
            if KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get ns openshift-dpu-operator >/dev/null 2>&1; then
              echo "Namespace 'openshift-dpu-operator' is still present after cleanup attempts"
              exit 1
            fi
          fi
        fi
      - echo "Namespace 'openshift-dpu-operator' has been removed."

  undeploy:
    deps:
      - task: undeploy-helper
        vars:
          KUBECONFIG: '{{.KUBECONFIG_DPU}}'
      - task: undeploy-helper
        vars:
          KUBECONFIG: '{{.KUBECONFIG_HOST}}'

  undeploy-1c:
    deps:
      - task: undeploy-helper
        vars:
          KUBECONFIG: '{{.KUBECONFIG_HOST}}'

  deploy-prep:
    internal: true
    deps:
      - task: kustomize
    cmds:
      - >
        go run ./tools/config/config.go
        -registry-url {{.REGISTRY}}
        -template-file config/dev/local-images-template.yaml
        -output-file bin/local-images.yaml
      - |
        if [ "{{.DEPLOY_PROFILE}}" = "upstream" ]; then
          cp config/dev/kustomization-upstream.yaml bin/kustomization.yaml
        else
          cp config/dev/kustomization.yaml bin/kustomization.yaml
        fi

  # Remove stale duplicate validating webhook configurations that conflict with
  # dpu-operator's canonical webhook name.
  reconcile-validating-webhook-configs:
    internal: true
    vars:
      KUBECONFIG: '{{.KUBECONFIG}}'
    cmds:
      - |
        KUBECONFIG={{.KUBECONFIG}} K8S_CLI={{.K8S_CLI}} python3 - <<'PY'
        import json
        import os
        import subprocess

        env = dict(os.environ)
        env["KUBECONFIG"] = os.environ["KUBECONFIG"]
        cli = os.environ.get("K8S_CLI", "kubectl")

        data = json.loads(subprocess.check_output([
            cli,
            "get",
            "validatingwebhookconfigurations",
            "-o",
            "json",
        ], env=env))

        for item in data.get("items", []):
            name = item.get("metadata", {}).get("name", "")
            if name == "dpu-operator-validating-webhook-configuration":
                continue

            for webhook in item.get("webhooks", []):
                if webhook.get("name") == "vdpuoperatorconfig.kb.io":
                    subprocess.run([
                        cli,
                        "delete",
                        "validatingwebhookconfiguration",
                        name,
                        "--ignore-not-found=true",
                    ], env=env, check=False)
                    break
        PY

  # On OpenShift clusters, reconcile webhook cert objects so OpenShift serving
  # cert and webhook CA bundle propagation can settle on the active owner.
  reconcile-openshift-webhook-tls:
    internal: true
    vars:
      KUBECONFIG: '{{.KUBECONFIG}}'
    cmds:
      - |
        if KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get --raw /apis/route.openshift.io/v1 >/dev/null 2>&1; then
          KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} annotate validatingwebhookconfiguration dpu-operator-validating-webhook-configuration cert-manager.io/inject-ca-from- --overwrite || true
          KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} -n openshift-dpu-operator delete certificate dpu-operator-serving-cert --ignore-not-found=true
          KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} -n openshift-dpu-operator delete issuer dpu-operator-selfsigned-issuer --ignore-not-found=true
          KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} -n openshift-dpu-operator delete secret webhook-server-cert --ignore-not-found=true
          KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} -n openshift-dpu-operator wait --for=create secret/webhook-server-cert --timeout=180s
          KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} wait --for=jsonpath='{.webhooks[0].clientConfig.caBundle}' validatingwebhookconfiguration/dpu-operator-validating-webhook-configuration --timeout=180s
        fi

  # Run post-deploy webhook reconciliation when webhook resources are enabled
  # in the selected deployment profile.
  reconcile-webhook-post-deploy:
    internal: true
    vars:
      KUBECONFIG: '{{.KUBECONFIG}}'
    cmds:
      - |
        if KUBECONFIG={{.KUBECONFIG}} {{.K8S_CLI}} get validatingwebhookconfiguration dpu-operator-validating-webhook-configuration >/dev/null 2>&1; then
          task reconcile-validating-webhook-configs KUBECONFIG={{.KUBECONFIG}}
          task reconcile-openshift-webhook-tls KUBECONFIG={{.KUBECONFIG}}
        fi
  
  ## Download envtest-setup locally if necessary
  envtest:
    status:
      - test -s {{.BINDIR}}/setup-envtest
      - ./{{.BINDIR}}/setup-envtest --help | head -1 | grep -q {{.SETUP_ENVTEST_VERSION}}
    cmds:
      - env -u GOOS -u GOARCH GOBIN={{.BINDIR_ABS}} GOFLAGS='' go install sigs.k8s.io/controller-runtime/tools/setup-envtest@{{.SETUP_ENVTEST_VERSION}}

  deploy:
    deps:
      - task: deploy-prep
    cmds:
      - task: undeploy
        vars:
          KUBECONFIG_DPU: "{{.KUBECONFIG_DPU}}"
          KUBECONFIG_HOST: "{{.KUBECONFIG_HOST}}"
      - bin/kustomize build bin | KUBECONFIG="{{.KUBECONFIG_DPU}}" {{.K8S_CLI}} apply -f -
      - bin/kustomize build bin | KUBECONFIG="{{.KUBECONFIG_HOST}}" {{.K8S_CLI}} apply -f -
      - task: reconcile-webhook-post-deploy
        vars:
          KUBECONFIG: "{{.KUBECONFIG_DPU}}"
      - task: reconcile-webhook-post-deploy
        vars:
          KUBECONFIG: "{{.KUBECONFIG_HOST}}"
      - KUBECONFIG="{{.KUBECONFIG_DPU}}" {{.K8S_CLI}} -n openshift-dpu-operator wait --for=condition=Available deployment/dpu-operator-controller-manager --timeout=300s
      - KUBECONFIG="{{.KUBECONFIG_HOST}}" {{.K8S_CLI}} -n openshift-dpu-operator wait --for=condition=Available deployment/dpu-operator-controller-manager --timeout=300s
      - KUBECONFIG="{{.KUBECONFIG_DPU}}" {{.K8S_CLI}} -n openshift-dpu-operator wait --for=condition=ready pod --all --timeout=300s
      - KUBECONFIG="{{.KUBECONFIG_HOST}}" {{.K8S_CLI}} -n openshift-dpu-operator wait --for=condition=ready pod --all --timeout=300s
      - echo "DPU operator deployment complete - controller manager and webhook are ready"

  deploy-1c:
    deps:
      - task: deploy-prep
    cmds:
      - task: undeploy-1c
        vars:
          KUBECONFIG_HOST: "{{.KUBECONFIG_HOST}}"
      - bin/kustomize build bin | KUBECONFIG="{{.KUBECONFIG_HOST}}" {{.K8S_CLI}} apply -f -
      - task: reconcile-webhook-post-deploy
        vars:
          KUBECONFIG: "{{.KUBECONFIG_HOST}}"
      - KUBECONFIG="{{.KUBECONFIG_HOST}}" {{.K8S_CLI}} -n openshift-dpu-operator wait --for=condition=Available deployment/dpu-operator-controller-manager --timeout=300s
      - KUBECONFIG="{{.KUBECONFIG_HOST}}" {{.K8S_CLI}} -n openshift-dpu-operator wait --for=condition=ready pod --all --timeout=300s

  deploy-upstream:
    cmds:
      - task: deploy
        vars:
          DEPLOY_PROFILE: upstream

  deploy-upstream-1c:
    cmds:
      - task: deploy-1c
        vars:
          DEPLOY_PROFILE: upstream

  prepare-e2e-test:
    cmds:
      - >
        if [ "{{.SUBMODULES}}" = "true" ]; then
            hack/prepare-submodules.sh
        fi
            hack/prepare-venv.sh

  e2e-test:
    deps:
      - task: kustomize
    cmds:
      - task: deploy-2-clusters
      - task: fast-e2e-test

  e2e-test-1-cluster:
    deps:
      - task: kustomize
    cmds:
      - task: deploy-1-cluster
      - task: fast-e2e-test-1c

  fast-e2e-test:
    cmds:
      - task: redeploy
      - KUBECONFIG_HOST={{.KUBECONFIG_HOST}} KUBECONFIG_DPU={{.KUBECONFIG_DPU}} go run tools/basic_setup/basic_setup.go
      - task: run-e2e-test

  fast-e2e-test-1c:
    cmds:
      - task: redeploy-1c
      - KUBECONFIG_HOST={{.KUBECONFIG_HOST}} go run tools/basic_setup/basic_setup.go
      - task: run-e2e-test

  run-e2e-test:
    deps:
      - task: ginkgo
      - task: envtest
    cmds:
      - >
        FAST_TEST=true
        KUBECONFIG_HOST={{.KUBECONFIG_HOST}}
        KUBECONFIG_DPU={{.KUBECONFIG_DPU}}
        REGISTRY={{.REGISTRY}}
        NF_INGRESS_IP=${NF_INGRESS_IP:-10.20.30.2}
        EXTERNAL_CLIENT_DEV=${EXTERNAL_CLIENT_DEV:-eno12409}
        EXTERNAL_CLIENT_IP=${EXTERNAL_CLIENT_IP:-10.20.30.100}
        KUBEBUILDER_ASSETS="$({{.BINDIR}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BINDIR_ABS}} -p path)"
        {{.BINDIR}}/ginkgo -coverprofile cover.out ./e2e_test/...
      - KUBECONFIG_HOST={{.KUBECONFIG_HOST}} sh hack/traffic_flow_tests.sh

  redeploy:
    cmds:
      - task: build-image-all
      - task: undeploy
      - task: deploy

  redeploy-1c:
    cmds:
      - task: build-image-all
      - task: undeploy-1c
      - task: deploy-1c

  ## Generate WebhookConfiguration, ClusterRole and CustomResourceDefinition objects.
  manifests:
    deps:
      - task: controller-gen
    cmds:
      - GOFLAGS='' {{.BINDIR}}/controller-gen rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=config/crd/bases

  bundle:
    deps:
      - task: manifests
      - task: kustomize
      - task: operator-sdk
    cmds:
      - "{{.BINDIR}}/operator-sdk generate kustomize manifests -q"
      - cd config/manager && ../../{{.BINDIR}}/kustomize edit set image controller=${IMG:-controller:latest}
      - "{{.BINDIR}}/kustomize build config/manifests | {{.BINDIR}}/operator-sdk generate bundle -q --overwrite --version ${VERSION:-4.21.0}"
      - "{{.BINDIR}}/operator-sdk bundle validate ./bundle"
      - cp bundle/manifests/* manifests/stable

  ## Generate code containing DeepCopy, DeepCopyInto, and DeepCopyObject method implementations.
  generate:
    deps:
      - task: controller-gen
    cmds:
      - GOFLAGS='' {{.BINDIR}}/controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./..."

  fmt:
    status:
      - |
        files=$(find . -name "*.go" -not -path "./vendor/*" -not -path "./dpu-api/vendor/*")
        output=$(gofmt -d $files)
        [ -z "$output" ]
    cmds:
      - go fmt ./...
      - cd api && go fmt ./...

  vet:
    cmds:
      - go vet ./...

  ## Download controller-gen locally if necessary. If wrong version is installed, it will be overwritten.
  controller-gen:
    status:
      - test -s {{.BINDIR}}/controller-gen
      - ./{{.BINDIR}}/controller-gen --version | grep -q {{.CONTROLLER_TOOLS_VERSION}}
    cmds:
      - env -u GOOS -u GOARCH GOBIN={{.BINDIR_ABS}} GOFLAGS='' go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_TOOLS_VERSION}}

  test:
    deps:
      - task: podman-check
      - task: manifests
      - task: generate
      - task: fmt
      - task: vet
      - task: envtest
      - task: ginkgo
    cmds:
      - >
        FAST_TEST=false
        KUBEBUILDER_ASSETS="$({{.BINDIR}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BINDIR_ABS}} -p path)"
        timeout 30m {{.BINDIR}}/ginkgo --repeat 4 {{if .TEST_FOCUS}}-focus "{{.TEST_FOCUS}}" {{end}}-coverprofile cover.out ./internal/... ./pkgs/... ./api/v1/...

  fast-test:
    deps:
      - task: envtest
      - task: ginkgo
    cmds:
      - >
        FAST_TEST=true
        KUBEBUILDER_ASSETS="$({{.BINDIR}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BINDIR_ABS}} -p path)"
        {{.BINDIR}}/ginkgo {{if .TEST_FOCUS}}-focus "{{.TEST_FOCUS}}" {{end}}-coverprofile cover.out ./internal/... ./pkgs/... ./api/v1/...

  vendor:
    cmds:
      - |
        for d in . dpu-api api tools ; do
          if [ "$d" = . ] ; then
            (cd "$d" && go mod vendor) || exit $? ;
          fi ;
          (cd "$d" && go mod tidy) || exit $? ;
        done
